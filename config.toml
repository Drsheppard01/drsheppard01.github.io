# The URL the site will be built for
base_url = "https://drsheppard01.github.io/"
theme = "austere"

# The site title and description; used in feeds by default.
title = "Dr. Sheppard's blog"

# The default site author.
author = "Dr. Sheppard"

# No SASS - CSS is internal (located in base.html template).
compile_sass = false
# Search index enabled.
build_search_index = true

# The default language; used in feeds.
default_language = "ru"

# When set to "true", a feed is automatically generated.
generate_feeds = true

# The filenames to use for the feeds. Used as the template filenames, too.
# Defaults to ["atom.xml"], which has a built-in template that renders an Atom 1.0 feed.
# There is also a built-in template "rss.xml" that renders an RSS 2.0 feed.
feed_filenames = ["rss.xml"]

taxonomies = [{ name = "tags", rss = true, paginate_by = 5 }]

[search]
# Required for search page to work.
index_format = "fuse_javascript"

[slugify]
# Controls slugification for page/section URLs.
paths = "on"
# Controls slugification for taxonomy terms (tags, categories, etc.).
taxonomies = "on"
# Controls slugification for heading anchors (H1 to H6 etc.).
anchors = "on"

[extra]

# Responsive images
image_format = "auto"
image_quality = 100
images_default_size = 1024
images_sizes = [512, 1024, 2048]

menu_links = [
  { url = "$BASE_URL/", name = "Home" },
  { url = "$BASE_URL/posts/", name = "Posts" },
  { url = "$BASE_URL/about/", name = "About" },
  { url = "$BASE_URL/projects/", name = "Projects" },
  { url = "$BASE_URL/tags/", name = "Tags" },
  { url = "$BASE_URL/search/", name = "Search" },
]

# The page footer options.
[extra.footer]
since = 2024
license = "CC BY-SA 1.0"
license_url = "https://creativecommons.org/licenses/by-sa/1.0/deed"

[extra.colours.light]
background = "#FAF7F2"
text = "#1a1a1a"
text_muted = "#3a3a3a"
accent = "#9E4440"
accent_hover = "#7A3533"
code_bg = "#f0ebe3"
border = "#e0d9ce"
# Dark colours.
[extra.colours.dark]
background = "#141413"
text = "#e8e8e8"
text_muted = "#a0a0a0"
accent = "#E07A5F"
accent_hover = "#F4A594"
code_bg = "#1e1e1d"
border = "#2a2a29"